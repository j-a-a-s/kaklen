name: Kaklen Infrastructure

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/infrastructure.yml"
      - ".terraform-version"
      - ".tflint.hcl"
      - "package.json"
      - "scripts/infra*.mjs"
      - "scripts/*infrastructure*.mjs"
      - "scripts/infrastructure.test.mjs"
      - "scripts/verify-infrastructure-*.mjs"
      - "docs/aws/**"
      - "docs/release/SPRINT_4A_INFRASTRUCTURE_VALIDATION.md"
      - "artifacts/sprint-4a-infrastructure-validation.json"
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/infrastructure.yml"
      - ".terraform-version"
      - ".tflint.hcl"
      - "package.json"
      - "scripts/infra*.mjs"
      - "scripts/*infrastructure*.mjs"
      - "scripts/infrastructure.test.mjs"
      - "scripts/verify-infrastructure-*.mjs"
      - "docs/aws/**"
      - "docs/release/SPRINT_4A_INFRASTRUCTURE_VALIDATION.md"
      - "artifacts/sprint-4a-infrastructure-validation.json"

permissions:
  contents: read

concurrency:
  group: kaklen-infrastructure-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Terraform staging validation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout recursively
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 9.15.4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: 1.15.8
          terraform_wrapper: false

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4
        with:
          tflint_version: v0.64.0

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@e07451d2e059ed86c2870430ea286b3a9e0bf241
        with:
          version: v0.72.0
          cache: true

      - name: Terraform formatting
        run: pnpm infra:fmt

      - name: Terraform validation and environment contract
        run: pnpm infra:validate

      - name: Terraform lint
        run: pnpm infra:lint

      - name: Infrastructure security
        run: pnpm infra:security

      - name: Credential-free staging plan
        run: pnpm infra:plan:staging

      - name: Repository secret scan
        run: pnpm security:scan

      - name: Generate CI evidence
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: node scripts/write-infrastructure-ci-evidence.mjs

      - name: Upload infrastructure evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: kaklen-infrastructure-evidence
          if-no-files-found: error
          path: |
            artifacts/infrastructure-ci-validation.json
            artifacts/infrastructure-environment-contract.json
            artifacts/infrastructure-security.json
            artifacts/sprint-4a-infrastructure-validation.json
            .artifacts/infra/staging-plan.txt
