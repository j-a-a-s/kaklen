name: Strict Release Gate

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: strict-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  strict:
    name: Strict release validation
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kaklen_dev
          POSTGRES_USER: kaklen
          POSTGRES_PASSWORD: kaklen_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kaklen -d kaklen_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://kaklen:kaklen_dev_password@localhost:5432/kaklen_dev?schema=public
      DATABASE_SSL: "false"
      API_PORT: 3000
      PORT: 3000
      WEB_PORT: 4200
      NODE_ENV: test
      REDIS_URL: redis://localhost:6379
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      AUTH_ALLOWED_ORIGINS: http://localhost:4200
      JWT_ACCESS_SECRET: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
      JWT_REFRESH_SECRET: 6b86b273ff34fce19d6b804eff5a3f5747ada4eaa22f1d49c01e52ddb7875b4b
      RATE_LIMIT_HASH_SECRET: 4b227777d4dd1fc61c6f884f48641d02b4d121d3fd328cb08b5531fcacdabf8a
      WHATSAPP_HASH_SECRET: d4735e3a265e16eee03f59718b9b5d03019c07d8b6c51f90da3a666eec13ab35
      PAYMENT_SANDBOX_SECRET: 4e07408562bedb8b60ce05c1decfe3ad16b722309a7c3799cb11a4e0bdf3a4a9
      SWAGGER_ENABLED: "true"
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: kaklen-ci
      COMMIT_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Strict gate
        run: pnpm release:check:strict

      - name: Upload strict artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: strict-release-artifacts
          path: |
            artifacts
            apps/api/coverage
            playwright-report
            test-results
