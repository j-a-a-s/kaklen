name: Kaklen Quality Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: kaklen-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Kaklen Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kaklen_dev
          POSTGRES_USER: kaklen
          POSTGRES_PASSWORD: kaklen_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kaklen -d kaklen_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mailpit:
        image: axllent/mailpit:v1.23
        ports:
          - 1025:1025
          - 8025:8025
        options: >-
          --health-cmd "wget -q --spider http://localhost:8025/"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://kaklen:kaklen_dev_password@localhost:5432/kaklen_dev?schema=public
      DATABASE_SSL: "false"
      NODE_ENV: test
      PORT: 3000
      API_PORT: 3000
      WEB_PORT: 4200
      REDIS_PORT: 6379
      MAILPIT_SMTP_PORT: 1025
      MAILPIT_WEB_PORT: 8025
      MAIL_HOST: localhost
      MAIL_PORT: 1025
      MAIL_SECURE: "false"
      MAIL_FROM: Kaklen <no-reply@kaklen.local>
      APP_PUBLIC_URL: http://localhost:4200
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      AUTH_ALLOWED_ORIGINS: http://localhost:4200
      JWT_ACCESS_SECRET: ci-access-secret-that-is-at-least-32-characters
      JWT_REFRESH_SECRET: ci-refresh-secret-that-is-at-least-32-characters
      COOKIE_SECURE: "false"
      AUTH_EMAIL_ENABLED: "true"
      COMMERCIAL_EMAIL_ENABLED: "true"
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: kaklen-ci
      WHATSAPP_MODE: manual
      WHATSAPP_HASH_SECRET: ci-whatsapp-secret-that-is-at-least-32-characters
      PAYMENT_GATEWAY: sandbox
      PAYMENT_SANDBOX_SECRET: ci-payment-secret-that-is-at-least-32-characters
      COMMIT_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Kaklen Quality Gate
        run: pnpm quality:gate:ci

      - name: Upload quality evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kaklen-quality-evidence
          if-no-files-found: warn
          path: |
            artifacts/quality-gate.json
            artifacts/quality-gate.log
            artifacts/technical-scorecard.json
            artifacts/forms-audit.json
            artifacts/e2e-result.json
            artifacts/i18n-server.json
            artifacts/sbom.cdx.json
            apps/api/coverage
            playwright-report
            test-results
