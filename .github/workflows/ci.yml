name: Kaklen Quality Gate

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: kaklen-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Kaklen Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kaklen_dev
          POSTGRES_USER: kaklen
          POSTGRES_PASSWORD: kaklen_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kaklen -d kaklen_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mailpit:
        image: axllent/mailpit:v1.23
        ports:
          - 1025:1025
          - 8025:8025
        options: >-
          --health-cmd "wget -q --spider http://localhost:8025/"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://kaklen:kaklen_dev_password@localhost:5432/kaklen_dev?schema=public
      DATABASE_SSL: "false"
      NODE_ENV: test
      PORT: 3000
      API_PORT: 3000
      WEB_PORT: 4200
      REDIS_PORT: 6379
      REDIS_URL: redis://localhost:6379
      MAILPIT_SMTP_PORT: 1025
      MAILPIT_WEB_PORT: 8025
      MAIL_HOST: localhost
      MAIL_PORT: 1025
      MAIL_SECURE: "false"
      MAIL_FROM: Kaklen <no-reply@kaklen.local>
      APP_PUBLIC_URL: http://localhost:4200
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      AUTH_ALLOWED_ORIGINS: http://localhost:4200
      JWT_ACCESS_SECRET: e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
      JWT_REFRESH_SECRET: 6b86b273ff34fce19d6b804eff5a3f5747ada4eaa22f1d49c01e52ddb7875b4b
      COOKIE_SECURE: "false"
      AUTH_EMAIL_ENABLED: "true"
      COMMERCIAL_EMAIL_ENABLED: "false"
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: kaklen-ci
      WHATSAPP_MODE: manual
      WHATSAPP_HASH_SECRET: d4735e3a265e16eee03f59718b9b5d03019c07d8b6c51f90da3a666eec13ab35
      PAYMENT_GATEWAY: sandbox
      PAYMENT_SANDBOX_SECRET: 4e07408562bedb8b60ce05c1decfe3ad16b722309a7c3799cb11a4e0bdf3a4a9
      RATE_LIMIT_HASH_SECRET: 4b227777d4dd1fc61c6f884f48641d02b4d121d3fd328cb08b5531fcacdabf8a
      SWAGGER_ENABLED: "true"
      COMMIT_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Kaklen Quality Gate
        env:
          COMMIT_RANGE: ${{ github.event_name == 'push' && format('{0}..{1}', github.event.before, github.sha) || github.event_name == 'pull_request' && format('{0}..{1}', github.event.pull_request.base.sha, github.event.pull_request.head.sha) || 'HEAD' }}
        run: pnpm quality:gate:ci

      - name: Repository Governance
        env:
          GH_TOKEN: ${{ github.token }}
        run: pnpm governance:remote:verify

      - name: Upload quality evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kaklen-quality-evidence
          if-no-files-found: warn
          path: |
            artifacts/quality-gate.json
            artifacts/quality-gate.log
            artifacts/technical-scorecard.json
            artifacts/forms-audit.json
            artifacts/e2e-result.json
            artifacts/i18n-server.json
            artifacts/sbom.cdx.json
            artifacts/command-diagnostics
            apps/api/coverage
            playwright-report
            test-results
