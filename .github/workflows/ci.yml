name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feature/foundation
      - feature/aws-runtime-foundation

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kaklen
          POSTGRES_USER: kaklen
          POSTGRES_PASSWORD: kaklen
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kaklen -d kaklen"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://kaklen:kaklen@localhost:5432/kaklen?schema=public
      DATABASE_SSL: "false"
      API_PORT: 3000
      PORT: 3000
      WEB_PORT: 4200
      NODE_ENV: test
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: kaklen-ci
      APP_VERSION: 0.1.0
      COMMIT_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Run lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Run build
        run: pnpm build

      - name: Build localized web bundles
        run: |
          pnpm --filter @kaklen/web build:es
          pnpm --filter @kaklen/web build:en
          pnpm --filter @kaklen/web build:pt-BR

      - name: Build API Docker image
        run: docker build --platform linux/amd64 -f apps/api/Dockerfile -t kaklen-api:ci .
