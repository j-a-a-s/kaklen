name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feature/foundation
      - feature/aws-runtime-foundation

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kaklen_dev
          POSTGRES_USER: kaklen
          POSTGRES_PASSWORD: kaklen_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kaklen -d kaklen_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://kaklen:kaklen_dev_password@localhost:5432/kaklen_dev?schema=public
      DATABASE_SSL: "false"
      API_PORT: 3000
      PORT: 3000
      WEB_PORT: 4200
      NODE_ENV: test
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: kaklen-ci
      COMMIT_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Prepare build metadata
        run: |
          echo "APP_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")" >> "$GITHUB_ENV"

      - name: Generate runtime config
        run: pnpm web:runtime-config

      - name: Run lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Run build
        run: pnpm build

      - name: Build localized web bundles
        run: |
          pnpm --filter @kaklen/web build:es
          pnpm --filter @kaklen/web build:en
          pnpm --filter @kaklen/web build:pt-BR

      - name: Build API Docker image
        run: docker build --platform linux/amd64 -f apps/api/Dockerfile -t kaklen-api:ci .

      - name: Build metadata summary
        run: |
          echo "### Kaklen build" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: $APP_VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: ${COMMIT_SHA:0:7}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build time: $BUILD_TIME" >> "$GITHUB_STEP_SUMMARY"
