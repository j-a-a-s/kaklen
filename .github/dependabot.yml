version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Santiago
    target-branch: main
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      runtime-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Santiago
    target-branch: main
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Santiago
    target-branch: main
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
    groups:
      images-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: terraform
    directory: /infra/environments/staging
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Santiago
    target-branch: main
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps)"
