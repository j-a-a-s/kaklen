packages:
  - "apps/*"
  - "packages/*"

onlyBuiltDependencies:
  - "@parcel/watcher"
  - "@prisma/client"
  - "@prisma/engines"
  - "argon2"
  - "esbuild"
  - "lmdb"
  - "msgpackr-extract"
  - "prisma"
  - "unrs-resolver"
allowBuilds:
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  argon2: true
  esbuild: true
  lmdb: true
  msgpackr-extract: true
  prisma: true
  unrs-resolver: true
