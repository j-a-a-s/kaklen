services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kaklen_dev
      POSTGRES_USER: kaklen
      POSTGRES_PASSWORD: kaklen_dev_password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - kaklen-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaklen -d kaklen_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:3
    profiles:
      - aws
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    volumes:
      - kaklen-localstack-data:/var/lib/localstack

volumes:
  kaklen-postgres-data:
  kaklen-localstack-data:
