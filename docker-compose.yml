services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kaklen
      POSTGRES_USER: kaklen
      POSTGRES_PASSWORD: kaklen
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - kaklen-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaklen -d kaklen"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kaklen-postgres-data:
